name: Integration

on:
  pull_request:
    branches:
      - master

jobs:
  integration:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Merge master
        run: |
          git config user.name "bot@djachenko[bot]"
          git config user.email "2991967+bot@djachenko[bot]@users.noreply.github.com"
          git merge origin/master --no-edit

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install ".[release]"

      - name: Bump version (no commit)
        run: semantic-release version --no-commit --no-tag --no-push --no-changelog

      - name: Patch dev suffix
        run: |
          python -c "
          import tomllib, pathlib, os
          with open('pyproject.toml', 'rb') as f:
              v = tomllib.load(f)['project']['version']
          p = pathlib.Path('pyproject.toml')
          p.write_text(p.read_text().replace(f'version = \"{v}\"', f'version = \"{v}.dev{os.environ[\"GITHUB_RUN_NUMBER\"]}\"'))
          "

      - name: Build
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Smoke test
        run: |
          VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")

          for i in {1..5}; do
            pip install --index-url https://test.pypi.org/simple/ --no-deps goodoc==$VERSION && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

          goodoc --help
